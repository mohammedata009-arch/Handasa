<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار الميكانيكا - إعداد محمد طه</title>
    <style>
        :root {
            --primary: #1e293b;
            --secondary: #d4af37;
            --success: #10b981;
            --danger: #ef4444;
            --light: #f8fafc;
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; 
            user-select: none; -webkit-user-select: none; /* حماية المحتوى */
        }

        .quiz-container { 
            background: white; width: 95%; max-width: 700px; padding: 30px; 
            border-radius: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); 
            position: relative;
        }

        /* تنسيق الصور التوضيحية */
        .vector-box { 
            width: 100%; height: 150px; background: #f1f5f9; 
            border-radius: 15px; margin-bottom: 20px; 
            display: flex; justify-content: center; align-items: center;
        }

        h1 { color: var(--primary); font-size: 1.6em; margin-bottom: 5px; text-align: center; }
        .subtitle { text-align: center; color: #64748b; font-weight: bold; margin-bottom: 10px; }

        .progress-bar { height: 10px; background: #eee; border-radius: 5px; margin: 20px 0; overflow: hidden; }
        #progress { height: 100%; background: var(--secondary); width: 0%; transition: 0.4s; }

        .question { font-size: 1.25em; font-weight: bold; margin-bottom: 20px; color: #334155; line-height: 1.5; }
        .options { display: grid; gap: 12px; }
        .option-btn { 
            padding: 15px; border: 2px solid #e2e8f0; background: var(--light); 
            border-radius: 12px; cursor: pointer; transition: 0.3s; text-align: right; 
            font-size: 1.1em; color: #1e293b; font-weight: 500;
        }
        .option-btn:hover { border-color: var(--secondary); background: #fffcf0; transform: translateY(-2px); }

        .feedback { 
            margin-top: 20px; padding: 18px; border-radius: 12px; display: none; 
            font-weight: bold; border-right: 6px solid; line-height: 1.4;
        }
        .correct { background: #dcfce7; color: #166534; border-color: #22c55e; }
        .wrong { background: #fee2e2; color: #991b1b; border-color: #ef4444; }

        #next-btn { 
            width: 100%; padding: 16px; background: var(--primary); color: white; 
            border: none; border-radius: 12px; margin-top: 20px; cursor: pointer; 
            font-weight: bold; font-size: 1.1em; transition: 0.3s;
        }
        #next-btn:hover { background: #334155; }
        
        #result-screen { display: none; text-align: center; padding: 40px 20px; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="quiz-container">
    <div id="quiz-content">
        <h1>اختبار الميكانيكا التفاعلي 📐</h1>
        <div class="subtitle">إشراف الأستاذ: محمد طه عطا المنان</div>
        
        <div class="progress-bar"><div id="progress"></div></div>
        
        <div id="visual-aid" class="vector-box" style="display:none;"></div>
        
        <div class="question" id="q-text"></div>
        <div class="options" id="q-options"></div>
        <div id="feedback" class="feedback"></div>
        <button id="next-btn" onclick="nextQuestion()" style="display:none;">السؤال التالي ⮕</button>
    </div>

    <div id="result-screen">
        <h2 style="color: var(--secondary); font-size: 2.2em;">إنجاز رائع! 🏆</h2>
        <div id="score-text" style="font-size: 2.5em; margin: 20px 0; font-weight: bold; color: var(--primary);"></div>
        <p style="font-size: 1.2em; color: #475569;">أيها المتدربون، لقد أظهرتم فهماً عميقاً للقوى والمتجهات والعزوم.</p>
        <button id="next-btn" onclick="location.reload()">إعادة المحاولة</button>
    </div>
</div>

<script>
    const questions = [
        { q: "ما هو الرمز الرياضي المتعارف عليه لمتجه القوة؟", opts: ["m", "v", "F"], ans: 2, exp: "صحيح، الرمز F يشير إلى Force (القوة)." },
        { q: "عند تمثيل المتجه بيانياً، ماذا يمثل طول السهم؟", opts: ["الاتجاه", "نقطة التأثير", "المقدار"], ans: 2, exp: "أحسنتم يا متدربين، طول السهم يتناسب طردياً مع مقدار الكمية." },
        { q: "وحدة قياس عزم القوة في النظام الدولي هي:", opts: ["N/m", "N.m", "N/m²"], ans: 1, exp: "العزم هو حاصل ضرب القوة في ذراعها، لذا الوحدة نيوتن.متر." },
        { q: "في الرسم الموضح، ما هي محصلة القوتين؟", opts: ["10N يميناً", "صفر (اتزان)", "20N يساراً"], ans: 1, exp: "بما أن القوتين متساويتين ومتضادتين، فإن المحصلة صفر.", svg: 'balance' },
        { q: "تعتبر القوة كمية متجهة لأن لها:", opts: ["مقداراً فقط", "اتجاهاً فقط", "مقداراً واتجاهاً"], ans: 2, exp: "رائع، الكميات المتجهة تفتقر للمعنى بدون تحديد الاتجاه." },
        { q: "متى تنعدم قيمة العزم رغم وجود قوة مؤثرة؟", opts: ["عندما تكون القوة عمودية", "عندما تمر القوة بمحور الدوران", "عندما تكون القوة مائلة"], ans: 1, exp: "إذا انعدم ذراع القوة (البعد)، ينعدم العزم تماماً." },
        { q: "محصلة قوتين (6N و 8N) بينهما زاوية قائمة تساوي:", opts: ["14N", "2N", "10N"], ans: 2, exp: "باستخدام فيثاغورس: √(6²+8²) = 10." },
        { q: "ماذا يسمى تأثير قوتين متساويتين ومتوازيتين وفي اتجاهين متضادين؟", opts: ["محصلة", "ازدواج", "ضغط"], ans: 1, exp: "هذا هو 'الازدواج' الذي يسبب دوراناً فقط بدون إزاحة." },
        { q: "في المتجه A = 5 units بزاوية 0°، تكون المركبة الرأسية (Ay) تساوي:", opts: ["5", "2.5", "صفر"], ans: 2, exp: "بما أن المتجه أفقي تماماً، فلا توجد له مركبة رأسية." },
        { q: "تزداد سهولة فتح الباب كلما كان مقبض الباب:", opts: ["قريباً من المفصلات", "بعيداً عن المفصلات", "صغيراً جداً"], ans: 1, exp: "كلما زاد طول ذراع القوة، زاد العزم وقل الجهد المطلوب." },
        { q: "أي من الكميات التالية ليست متجهة؟", opts: ["السرعة المتجهة", "الكتلة", "الوزن"], ans: 1, exp: "الكتلة كمية قياسية لا تعتمد على الاتجاه." },
        { q: "عند تحليل متجه القوة المائل بزاوية θ، فإن المركبة الأفقية هي:", opts: ["F sin θ", "F cos θ", "F tan θ"], ans: 1, exp: "المركبة القريبة من الزاوية تأخذ جيب التمام (Cos)." },
        { q: "الجهاز المستخدم لقياس مقدار القوة هو:", opts: ["الميزان ذو الكفتين", "الميزان الزنبركي", "الترمومتر"], ans: 1, exp: "الميزان الزنبركي (اللولبي) يقيس القوة بالنيوتن." },
        { q: "إذا كانت المحصلة تساوي صفراً، فإن الجسم يكون في حالة:", opts: ["تسارع", "اتزان", "سقوط حر"], ans: 1, exp: "الاتزان يعني أن مجموع القوى المؤثرة يتلاشى." },
        { q: "ما هو اتجاه عزم القوة إذا كان الدوران عكس عقارب الساعة؟", opts: ["للداخل", "للخارج (موجب)", "لليمين"], ans: 1, exp: "حسب قاعدة اليد اليمنى، الدوران عكس العقارب يعتبر موجباً." }
    ];

    let current = 0, score = 0;

    const svgs = {
        balance: `<svg viewBox="0 0 200 100" width="100%" height="100%"><line x1="100" y1="50" x2="40" y2="50" stroke="red" stroke-width="4" marker-end="url(#arr)"/><line x1="100" y1="50" x2="160" y2="50" stroke="blue" stroke-width="4" marker-end="url(#arr)"/><circle cx="100" cy="50" r="6" fill="#1e293b"/><text x="30" y="40" fill="red">10N</text><text x="145" y="40" fill="blue">10N</text><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="context-stroke" /></marker></defs></svg>`
    };

    function loadQuestion() {
        const q = questions[current];
        document.getElementById('q-text').innerText = `سؤال ${current + 1}: ${q.q}`;
        const optContainer = document.getElementById('q-options');
        optContainer.innerHTML = '';
        
        const visual = document.getElementById('visual-aid');
        if(q.svg) { visual.style.display = 'flex'; visual.innerHTML = svgs[q.svg]; }
        else { visual.style.display = 'none'; }
        
        q.opts.forEach((o, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = o;
            btn.onclick = () => checkAnswer(i);
            optContainer.appendChild(btn);
        });

        document.getElementById('feedback').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('progress').style.width = (current / questions.length * 100) + '%';
    }

    function checkAnswer(idx) {
        const q = questions[current];
        const fb = document.getElementById('feedback');
        fb.style.display = 'block';
        if(idx === q.ans) {
            score++; fb.className = 'feedback correct';
            fb.innerText = "✅ " + q.exp;
        } else {
            fb.className = 'feedback wrong';
            fb.innerText = "❌ انتبهوا أيها المتدربون.. " + q.exp;
        }
        document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        current++;
        if(current < questions.length) loadQuestion();
        else {
            document.getElementById('quiz-content').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('score-text').innerText = `النتيجة: ${score} من 15`;
        }
    }

    // منع الاختصارات للحماية
    document.onkeydown = (e) => {
        if(e.ctrlKey && (e.key === 'u' || e.key === 'c' || e.key === 's')) return false;
        if(e.keyCode == 123) return false;
    };

    loadQuestion();
</script>
</body>
</html>
